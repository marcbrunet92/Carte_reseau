server {
    listen 80;
    server_name ton-domaine.fr www.ton-domaine.fr;

    # Redirection HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name ton-domaine.fr www.ton-domaine.fr;

    # Certificats SSL (Let's Encrypt via certbot)
    ssl_certificate     /etc/letsencrypt/live/ton-domaine.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ton-domaine.fr/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Proxy vers Next.js
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # Nécessaire pour WebSocket (hot reload en dev, optionnel en prod)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 60s;
    }

    # Cache des assets statiques Next.js
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Logs
    access_log /var/log/nginx/nextjs_access.log;
    error_log  /var/log/nginx/nextjs_error.log;
}